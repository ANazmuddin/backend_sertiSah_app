<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Admin - SertiSah</title>
  
  <link rel="stylesheet" href="/static/admin.css">
  
  <style>
    /* CSS Reset & Variables untuk tema Indigo ala SertiSah */
    :root {
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --bg-light: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #cbd5e1;
      --error-bg: #fef2f2;
      --error-border: #fca5a5;
      --error-text: #b91c1c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background-color: var(--bg-light); color: var(--text-main); -webkit-font-smoothing: antialiased; }

    /* Layout Utama */
    .login-wrapper { display: flex; min-height: 100vh; width: 100%; }

    /* Sisi Kiri: Branding (Desktop) / Header (Mobile) */
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, var(--primary) 0%, #312e81 100%);
      color: white;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Efek cahaya halus di background kiri */
    .login-left::after {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
    }

    .login-left-content { position: relative; z-index: 10; max-width: 480px; margin: 0 auto; }
    
    .login-left-content h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 1.2rem; line-height: 1.2; letter-spacing: -0.5px; }
    .login-left-content p { font-size: 1.1rem; color: #e0e7ff; line-height: 1.6; }

    /* Sisi Kanan: Area Form */
    .login-right {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }

    /* Card Form Login */
    .login-card {
      width: 100%; max-width: 420px; background: white; padding: 2.5rem;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
    }

    .login-card h2 { font-size: 1.75rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
    .login-subtitle { text-align: center; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }

    /* Error Alert Box */
    .error-box {
      background-color: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border);
      padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.9rem;
      display: flex; align-items: center; gap: 0.5rem; font-weight: 500;
    }

    /* Form Inputs */
    .input-group { margin-bottom: 1.5rem; position: relative; }
    .input-group label {
      display: block; font-size: 0.875rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem;
    }
    
    .input-wrapper { position: relative; display: flex; align-items: center; }
    .input-wrapper input {
      width: 100%; padding: 0.875rem 1rem; border: 1px solid var(--border-color);
      border-radius: 0.75rem; font-size: 1rem; background: var(--bg-light);
      transition: all 0.2s ease; outline: none;
    }
    .input-wrapper input:focus {
      background: white; border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    /* Tombol Toggle Password */
    .toggle-password {
      position: absolute; right: 1rem; color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0.2rem;
    }
    .toggle-password:hover { color: var(--primary); }

    /* Tombol Submit */
    .login-btn {
      width: 100%; padding: 0.875rem; background-color: var(--primary); color: white;
      border: none; border-radius: 0.75rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background-color 0.2s, transform 0.1s; margin-top: 0.5rem;
    }
    .login-btn:hover { background-color: var(--primary-hover); }
    .login-btn:active { transform: scale(0.98); }

    /* Responsive untuk Tablet dan HP */
    @media (max-width: 900px) {
      .login-wrapper { flex-direction: column; }
      .login-left { flex: none; padding: 3rem 1.5rem; text-align: center; border-radius: 0 0 2rem 2rem; }
      .login-left-content h1 { font-size: 2rem; }
      .login-right { padding: -2rem 1.5rem 2rem; align-items: flex-start; margin-top: -2rem; z-index: 20; }
      .login-card { padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="login-left">
    <div class="login-left-content">
      <h1>SertiSah Admin</h1>
      <p>
        Platform backend untuk penerbitan dan manajemen 
        sertifikat akademik digital yang terintegrasi langsung dengan Blockchain.
      </p>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">

      <h2>Selamat Datang</h2>
      <p class="login-subtitle">Silakan masuk ke akun administrator Anda</p>

      {% if error %}
        <div class="error-box">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          {{ error }}
        </div>
      {% endif %}

      <form method="post" action="/login">

        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" placeholder="Masukkan username" required>
          </div>
        </div>

        <div class="input-group">
          <label for="passwordInput">Password</label>
          <div class="input-wrapper">
            <input type="password" name="password" id="passwordInput" placeholder="Masukkan password" required>
            
            <span class="toggle-password" onclick="togglePassword()" title="Tampilkan Password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
          </div>
        </div>

        <button type="submit" class="login-btn">
          Masuk ke Dashboard
        </button>

      </form>

    </div>
  </div>

</div>

<script>
function togglePassword() {
  const input = document.getElementById("passwordInput");
  const icon = document.getElementById("eyeIcon");

  if (input.type === "password") {
    input.type = "text";
    icon.innerHTML = `
      <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.8 21.8 0 0 1 5.17-6.88"/>
      <path d="M1 1 23 23"/>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
    `; // Icon Eye-Off
  } else {
    input.type = "password";
    icon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    `; // Icon Eye
  }
}
</script>

</body>
</html>
